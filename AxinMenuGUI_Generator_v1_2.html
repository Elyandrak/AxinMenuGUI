<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AxinMenuGUI — Generador Visual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Cinzel:wght@600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap');
:root {
  --bg:#0f0e0c;--bg2:#161410;--bg3:#1e1b16;--bg4:#252118;
  --border:#2e2a20;--border2:#3a3528;
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e199;--amber:#d47c2a;
  --stone:#8a7f6a;--stone2:#b5a98a;--text:#e8e0cc;--text2:#b5a98a;--text3:#7a7060;
  --green:#6aab6a;--red:#c96a6a;--blue:#6a9ec9;
  --slot-empty:#1a1814;--slot-filled:#252018;--slot-sel:#3a3020;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.6;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--amber));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-text{font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);letter-spacing:.04em}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--stone)}
.hbadge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--stone);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px}

/* LAYOUT */
#app{display:grid;grid-template-columns:270px 1fr 310px;min-height:calc(100vh - 58px)}

/* PANEL LEFT */
#panel-left{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.psec{padding:14px 16px;border-bottom:1px solid var(--border)}
.ptitle{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ptitle::before{content:'';width:10px;height:1px;background:var(--border2)}

/* INPUTS */
label{display:block;font-size:11px;color:var(--stone2);font-family:'JetBrains Mono',monospace;margin-bottom:3px;margin-top:9px}
label:first-of-type{margin-top:0}
input[type=text],input[type=number],select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:52px}
input[type=number]{width:68px}

/* ITEM PICKER */
#item-search{margin-bottom:8px}
.item-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-height:340px;overflow-y:auto}
.item-card{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 2px;text-align:center;cursor:pointer;transition:all .12s;user-select:none;position:relative}
.item-card:hover{border-color:var(--gold);background:var(--bg4)}
.item-card.selected{border-color:var(--gold2);background:var(--slot-sel);box-shadow:0 0 0 1px var(--gold2)}
.item-card img{width:36px;height:36px;display:block;margin:0 auto;image-rendering:pixelated}
.item-card-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--stone2);line-height:1.1;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px}

/* CUSTOM CODE */
.custom-row{display:flex;gap:6px;margin-top:6px}
.custom-row input{flex:1}

/* CENTER */
#panel-center{padding:24px;display:flex;flex-direction:column;align-items:center;gap:18px;overflow-y:auto}

/* SCENES */
.scenes-bar{display:flex;align-items:center;gap:5px;width:100%;max-width:600px;flex-wrap:wrap}
.stab{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 13px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--stone2);cursor:pointer;transition:all .12s;user-select:none}
.stab:hover{border-color:var(--stone);color:var(--text)}
.stab.active{border-color:var(--gold);background:var(--slot-sel);color:var(--gold2)}
.stab.add{border-style:dashed;color:var(--text3)}
.stab.add:hover{color:var(--gold2);border-color:var(--gold)}
.stab.del{padding:5px 8px;color:var(--red);border-color:transparent;background:transparent}
.stab.del:hover{border-color:var(--red);background:rgba(201,106,106,.1)}

/* GRID */
.grid-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;width:100%;max-width:600px}
.grid-titlebar{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);text-align:center;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);letter-spacing:.04em}
.slot-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.slot{aspect-ratio:1;background:var(--slot-empty);border:1px solid var(--border2);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;position:relative;min-width:0;overflow:hidden;user-select:none}
.slot:hover{border-color:var(--stone);background:var(--bg4)}
.slot.filled{background:var(--slot-filled)}
.slot.selected{border-color:var(--gold2)!important;background:var(--slot-sel)!important;box-shadow:0 0 0 1px var(--gold2)}
.slot.drag-over{border-color:var(--gold2)!important;background:rgba(201,168,76,.12)!important}
.slot img{width:78%;height:78%;image-rendering:pixelated;display:block}
.slot-num{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--text3);position:absolute;bottom:1px;right:2px}
.slot-dot{position:absolute;top:2px;left:2px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.grid-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:8px}

/* JSON */
#json-area{width:100%;max-width:600px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.json-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.json-hdr-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stone2);letter-spacing:.06em}
#json-out{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.7;padding:16px;background:transparent;border:none;width:100%;min-height:160px;max-height:380px;resize:vertical;outline:none}
.copy-ok{color:var(--green);font-size:11px;font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity .3s}
.copy-ok.show{opacity:1}

/* PANEL RIGHT */
#panel-right{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto}
.empty-editor{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);padding:40px 20px;text-align:center}
.empty-icon{font-size:38px;opacity:.35}
.empty-editor p{font-family:'JetBrains Mono',monospace;font-size:11px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:7px 13px;border-radius:5px;border:1px solid transparent;cursor:pointer;transition:all .15s;user-select:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--bg);border-color:var(--gold)}
.btn-gold:hover{filter:brightness(1.1)}
.btn-out{background:transparent;color:var(--stone2);border-color:var(--border2)}
.btn-out:hover{border-color:var(--stone2);color:var(--text)}
.btn-danger{background:rgba(201,106,106,.1);color:var(--red);border-color:rgba(201,106,106,.3)}
.btn-danger:hover{background:rgba(201,106,106,.2)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-full{width:100%;justify-content:center}

/* EVENT ITEMS */
.ev-item{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:9px 11px;margin-bottom:7px}
.ev-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ev-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(201,168,76,.15);color:var(--gold2);border:1px solid rgba(201,168,76,.3)}

/* MISC */
hr{border:none;border-top:1px solid var(--border);margin:10px 0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.callout{border-radius:6px;padding:9px 13px;margin:8px 0;border-left:3px solid;font-size:13px}
.callout.tip{background:rgba(106,171,106,.08);border-color:var(--green);color:var(--stone2)}
</style>
</head>
<body>

<div id="header">
  <div class="logo-icon">🗂</div>
  <div><div class="logo-text">AxinMenuGUI</div><div class="logo-sub">Generador Visual · 76 ítems VS + 50 iconos del mod</div></div>
  <span class="hbadge">v1.2</span>
</div>

<div id="app">

  <!-- ═══ PANEL LEFT ═══ -->
  <div id="panel-left">

    <div class="psec">
      <div class="ptitle">Configuración del menú</div>
      <label>ID *</label>
      <input type="text" id="cfg-id" value="mi-menu" placeholder="mainmenu">
      <label>Título</label>
      <input type="text" id="cfg-title" value="Mi Menú" placeholder="Mi Menú">
      <label>Filas (1–6)</label>
      <input type="number" id="cfg-rows" min="1" max="6" value="3" onchange="updateRows()">
      <label>Command Alias</label>
      <input type="text" id="cfg-alias" placeholder="menu">
      <label>Alias Target</label>
      <select id="cfg-alias-target">
        <option value="OPTIONAL">OPTIONAL</option>
        <option value="REQUIRED">REQUIRED</option>
        <option value="DISABLED">DISABLED</option>
      </select>
      <label>Permission (vacío = todos)</label>
      <input type="text" id="cfg-permission" placeholder="">
    </div>

    <div class="psec" style="flex:1">
      <div class="ptitle">Seleccionar ítem</div>
      
      <select id="cat-filter" onchange="filterItems()" style="margin-bottom:6px;width:100%">
        <option value="">Todas las categorías</option>
        <option value="Ítems VS">Ítems VS (76)</option>
        <option value="Navegación">Navegación</option>
        <option value="Tienda">Tienda</option>
        <option value="Admin">Admin / Roles</option>
        <option value="UI">UI / Info</option>
        <option value="Social">Social</option>
        <option value="Decorativo">Decorativo</option>
      </select>
      <input type="text" id="item-search" placeholder="Buscar ítem..." oninput="filterItems()" style="margin-bottom:8px">
      <div class="item-grid" id="item-grid"></div>
      <hr>
      <label>Código VS personalizado</label>
      <div class="custom-row">
        <input type="text" id="custom-code" placeholder="game:gem-diamond">
        <button class="btn btn-out btn-sm" onclick="selectCustom()">Usar</button>
      </div>
    </div>

  </div>

  <!-- ═══ PANEL CENTER ═══ -->
  <div id="panel-center">

    <div class="scenes-bar" id="scenes-bar"></div>

    <div class="grid-wrap">
      <div class="grid-titlebar" id="grid-title">Mi Menú</div>
      <div class="slot-grid" id="slot-grid"></div>
      <div class="grid-hint">Clic en slot vacío + ítem seleccionado → colocar · Clic en slot relleno → editar · Arrastrar para mover</div>
    </div>

    <div id="json-area">
      <div class="json-hdr">
        <span class="json-hdr-title">📄 JSON GENERADO</span>
        <div style="display:flex;gap:7px;align-items:center">
          <span class="copy-ok" id="copy-ok">✓ Copiado</span>
          <button class="btn btn-out btn-sm" onclick="copyJSON()">Copiar</button>
          <button class="btn btn-gold btn-sm" onclick="generateJSON()">⚡ Generar</button>
        </div>
      </div>
      <textarea id="json-out" readonly placeholder="Haz clic en ⚡ Generar..."></textarea>
    </div>

  </div>

  <!-- ═══ PANEL RIGHT ═══ -->
  <div id="panel-right">
    <div id="editor-content">
      <div class="empty-editor">
        <div class="empty-icon">🖱</div>
        <p>Selecciona un slot<br>del grid para editar</p>
      </div>
    </div>
  </div>

</div>

// ═══════════════════════════════
// ESTADO
// ═══════════════════════════════
const S = {
  id:'mi-menu', title:'Mi Menú', rows:3,
  alias:'', aliasTarget:'OPTIONAL', permission:'',
  scenes:[{}],
  scene:0,
  slot:null,
  item:null,    // {code, name, img} seleccionado del picker
  drag:null,    // 'picker' | slotIndex
};

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  buildPicker();
  renderScenes();
  renderGrid();
  bindConfig();
});

function bindConfig(){
  document.getElementById('cfg-id').oninput=e=>S.id=e.target.value.trim()||'menu';
  document.getElementById('cfg-title').oninput=e=>{S.title=e.target.value;document.getElementById('grid-title').textContent=S.title||'Menú'};
  document.getElementById('cfg-alias').oninput=e=>S.alias=e.target.value.trim();
  document.getElementById('cfg-alias-target').onchange=e=>S.aliasTarget=e.target.value;
  document.getElementById('cfg-permission').oninput=e=>S.permission=e.target.value.trim();
}

// ═══════════════════════════════
// PICKER
// ═══════════════════════════════
function buildPicker(filter='', catFilter=''){
  const grid=document.getElementById('item-grid');
  grid.innerHTML='';
  const q=filter.toLowerCase();
  ITEMS.filter(i=>((!q||i.name.toLowerCase().includes(q)||i.code.includes(q))&&(!catFilter||i.cat===catFilter))).forEach(item=>{
    const card=document.createElement('div');
    card.className='item-card'+(S.item&&S.item.code===item.code?' selected':'');
    card.draggable=true;
    card.innerHTML=`<img src="${item.img}" title="${item.code}"><div class="item-card-label">${item.name}</div>`;
    card.onclick=()=>selectItem(item);
    card.ondragstart=e=>{S.drag='picker';S.item=item;e.dataTransfer.setData('text/plain','picker')};
    grid.appendChild(card);
  });
}

function filterItems(){
  const q = document.getElementById('item-search').value;
  const cat = document.getElementById('cat-filter') ? document.getElementById('cat-filter').value : '';
  buildPicker(q, cat);
}

function selectItem(item){
  S.item=item;
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function selectCustom(){
  const code=document.getElementById('custom-code').value.trim();
  if(!code)return;
  S.item={code,name:code.replace('game:',''),img:null};
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('selected'));
}

// ═══════════════════════════════
// ROWS
// ═══════════════════════════════
function updateRows(){
  const v=parseInt(document.getElementById('cfg-rows').value);
  if(v>=1&&v<=6){S.rows=v;renderGrid();}
}

// ═══════════════════════════════
// SCENES
// ═══════════════════════════════
function renderScenes(){
  const bar=document.getElementById('scenes-bar');
  bar.innerHTML='';
  S.scenes.forEach((_,i)=>{
    const t=document.createElement('div');
    t.className='stab'+(i===S.scene?' active':'');
    t.textContent=`Escena ${i}`;
    t.onclick=()=>switchScene(i);
    bar.appendChild(t);
  });
  const add=document.createElement('div');
  add.className='stab add';add.textContent='+ Escena';add.onclick=addScene;
  bar.appendChild(add);
  if(S.scenes.length>1){
    const del=document.createElement('div');
    del.className='stab del';del.textContent='🗑';del.title='Eliminar escena';del.onclick=delScene;
    bar.appendChild(del);
  }
}
function switchScene(i){S.scene=i;S.slot=null;renderScenes();renderGrid();renderEditor()}
function addScene(){S.scenes.push({});S.scene=S.scenes.length-1;S.slot=null;renderScenes();renderGrid();renderEditor()}
function delScene(){if(S.scenes.length<=1)return;S.scenes.splice(S.scene,1);S.scene=Math.max(0,S.scene-1);S.slot=null;renderScenes();renderGrid();renderEditor()}

// ═══════════════════════════════
// GRID
// ═══════════════════════════════
function renderGrid(){
  const grid=document.getElementById('slot-grid');
  grid.innerHTML='';
  const scene=S.scenes[S.scene];
  const total=S.rows*9;
  for(let i=0;i<total;i++){
    const sl=document.createElement('div');
    sl.className='slot';
    sl.dataset.i=i;
    const item=scene[i];
    if(item){
      sl.classList.add('filled');
      if(item.img){const img=document.createElement('img');img.src=item.img;sl.appendChild(img);}
      else{const sp=document.createElement('span');sp.textContent='📦';sp.style.fontSize='18px';sl.appendChild(sp);}
      if(item.events&&item.events.length){const d=document.createElement('div');d.className='slot-dot';d.title=item.events.length+' evento(s)';sl.appendChild(d);}
    }
    if(i===S.slot)sl.classList.add('selected');
    const num=document.createElement('span');num.className='slot-num';num.textContent=i;sl.appendChild(num);
    sl.onclick=()=>onSlotClick(i);
    sl.ondragover=e=>{e.preventDefault();sl.classList.add('drag-over')};
    sl.ondragleave=()=>sl.classList.remove('drag-over');
    sl.ondrop=e=>{e.preventDefault();sl.classList.remove('drag-over');onDrop(i)};
    sl.draggable=!!item;
    sl.ondragstart=e=>{if(item){S.drag=i;e.dataTransfer.setData('text/plain','slot')}};
    grid.appendChild(sl);
  }
}

function onSlotClick(i){
  const scene=S.scenes[S.scene];
  if(!scene[i]&&S.item){
    scene[i]={code:S.item.code,name:'',lore:[],amount:1,img:S.item.img,events:[]};
    S.slot=i;renderGrid();renderEditor();return;
  }
  S.slot=i;renderGrid();renderEditor();
}

function onDrop(target){
  const scene=S.scenes[S.scene];
  if(S.drag==='picker'&&S.item){
    scene[target]={code:S.item.code,name:'',lore:[],amount:1,img:S.item.img,events:[]};
  } else if(typeof S.drag==='number'&&S.drag!==target){
    const src=scene[S.drag];
    if(src){scene[target]={...src};delete scene[S.drag];}
  }
  S.drag=null;S.slot=target;renderGrid();renderEditor();
}

// ═══════════════════════════════
// EDITOR
// ═══════════════════════════════
function renderEditor(){
  const cont=document.getElementById('editor-content');
  const scene=S.scenes[S.scene];
  if(S.slot===null){
    cont.innerHTML=`<div class="empty-editor"><div class="empty-icon">🖱</div><p>Selecciona un slot<br>del grid para editar</p></div>`;return;
  }
  const item=scene[S.slot];
  if(!item){
    cont.innerHTML=`<div class="empty-editor"><div class="empty-icon">📦</div><p>Slot ${S.slot} vacío<br><span style="color:var(--gold2)">Selecciona un ítem<br>y haz clic aquí</span></p></div>`;return;
  }

  const previewImg=item.img?`<img src="${item.img}" style="width:48px;height:48px;image-rendering:pixelated;border-radius:5px;border:1px solid var(--border2)">`:`<span style="font-size:36px">📦</span>`;

  cont.innerHTML=`
<div class="psec">
  <div class="ptitle">Slot ${S.slot} — Ítem</div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    ${previewImg}
    <div style="flex:1;min-width:0">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.code}</div>
    </div>
  </div>
  <label>Código VS</label>
  <input type="text" id="ed-code" value="${esc(item.code)}">
  <label>Nombre (admite {player})</label>
  <input type="text" id="ed-name" value="${esc(item.name||'')}">
  <label>Lore (una línea por línea)</label>
  <textarea id="ed-lore" rows="3">${esc((item.lore||[]).join('\n'))}</textarea>
  <label>Amount</label>
  <input type="number" id="ed-amount" min="1" max="64" value="${item.amount||1}" style="width:68px">
  <div style="margin-top:10px;display:flex;gap:5px;flex-wrap:wrap">
    <button class="btn btn-gold btn-sm" onclick="saveSlot(${S.slot})">💾 Guardar</button>
    <button class="btn btn-danger btn-sm" onclick="delSlot(${S.slot})">🗑 Eliminar</button>
  </div>
</div>
<div class="psec">
  <div class="ptitle">Click Events</div>
  <div id="ev-list"></div>
  <button class="btn btn-out btn-sm btn-full" style="margin-top:4px" onclick="addEvent(${S.slot})">+ Añadir evento</button>
</div>`;

  renderEvents(item, S.slot);
}

function renderEvents(item, slotIdx){
  const list=document.getElementById('ev-list');
  if(!list)return;
  list.innerHTML='';
  (item.events||[]).forEach((ev,i)=>{
    const div=document.createElement('div');
    div.className='ev-item';
    div.innerHTML=`
<div class="ev-hdr">
  <span class="ev-badge" id="ev-badge-${i}">${ev.type}</span>
  <button class="btn btn-danger btn-sm" onclick="delEvent(${slotIdx},${i})">✕</button>
</div>
<label>Tipo</label>
<select onchange="updEv(${slotIdx},${i},'type',this.value);document.getElementById('ev-badge-${i}').textContent=this.value;renderEditor()">
  ${['message','closeGui','openGui','nextScene','previousScene','back','consoleCommand','playerCommand'].map(t=>`<option value="${t}"${ev.type===t?' selected':''}>${t}</option>`).join('')}
</select>
<label>Click type</label>
<select onchange="updEv(${slotIdx},${i},'clickType',this.value)">
  ${['ANY','LEFT','RIGHT'].map(t=>`<option value="${t}"${ev.clickType===t?' selected':''}>${t}</option>`).join('')}
</select>
${ev.type==='message'?`<label>Mensaje</label><input type="text" value="${esc(ev.message||'')}" oninput="updEv(${slotIdx},${i},'message',this.value)" placeholder="Hola {player}!">`:''}
${ev.type==='openGui'?`<label>GUI ID destino</label><input type="text" value="${esc(ev.guiId||'')}" oninput="updEv(${slotIdx},${i},'guiId',this.value)" placeholder="shop">`:''}
${ev.type==='consoleCommand'||ev.type==='playerCommand'?`<label>Comandos (uno por línea)</label><textarea oninput="updEv(${slotIdx},${i},'commands',this.value.split('\n').filter(Boolean))" placeholder="/time set 8:00">${esc((ev.commands||[]).join('\n'))}</textarea>`:''}
    `;
    list.appendChild(div);
  });
}

function saveSlot(idx){
  const sc=S.scenes[S.scene];const item=sc[idx];if(!item)return;
  item.code=document.getElementById('ed-code')?.value.trim()||item.code;
  item.name=document.getElementById('ed-name')?.value.trim()||'';
  item.amount=parseInt(document.getElementById('ed-amount')?.value)||1;
  const lr=document.getElementById('ed-lore')?.value||'';
  item.lore=lr.split('\n').map(l=>l.trim()).filter(Boolean);
  // actualizar icono si cambió el código
  const found=ITEMS.find(i=>i.code===item.code);
  if(found)item.img=found.img;
  renderGrid();renderEditor();
}
function delSlot(idx){delete S.scenes[S.scene][idx];S.slot=null;renderGrid();renderEditor()}
function addEvent(idx){const item=S.scenes[S.scene][idx];if(!item)return;if(!item.events)item.events=[];item.events.push({type:'message',clickType:'ANY',message:'',commands:[],guiId:''});renderEditor()}
function delEvent(idx,i){const item=S.scenes[S.scene][idx];if(!item||!item.events)return;item.events.splice(i,1);renderEditor()}
function updEv(slotIdx,evIdx,field,value){const item=S.scenes[S.scene][slotIdx];if(!item||!item.events||!item.events[evIdx])return;item.events[evIdx][field]=value}

// ═══════════════════════════════
// JSON
// ═══════════════════════════════
function generateJSON(){
  S.id=document.getElementById('cfg-id').value.trim()||'menu';
  S.title=document.getElementById('cfg-title').value.trim()||'Menú';
  S.rows=parseInt(document.getElementById('cfg-rows').value)||3;
  S.alias=document.getElementById('cfg-alias').value.trim();
  S.aliasTarget=document.getElementById('cfg-alias-target').value;
  S.permission=document.getElementById('cfg-permission').value.trim();

  const out={
    id:S.id,title:S.title,rows:S.rows,
    commandAlias:S.alias,commandAliasTarget:S.aliasTarget,
    permission:S.permission,openTriggers:[],scenes:{}
  };

  S.scenes.forEach((scene,si)=>{
    const items={};
    Object.entries(scene).forEach(([idx,item])=>{
      const evs={};
      (item.events||[]).forEach((ev,i)=>{
        evs[`ev${i+1}`]={type:ev.type,clickType:ev.clickType||'ANY',delay:0,
          message:ev.message||'',commands:ev.commands||[],item:'',amount:1,location:'',guiId:ev.guiId||''};
      });
      items[`item-s${si}-${idx}`]={
        slot:parseInt(idx),item:item.code,amount:item.amount||1,
        name:item.name||'',lore:item.lore||[],
        clickEvents:evs,conditions:{},conditionFailMessage:''
      };
    });
    out.scenes[String(si)]={delay:0,items};
  });

  document.getElementById('json-out').value=JSON.stringify(out,null,2);
}

function copyJSON(){
  const ta=document.getElementById('json-out');
  if(!ta.value)generateJSON();
  navigator.clipboard.writeText(ta.value).then(()=>{
    const el=document.getElementById('copy-ok');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2000);
  });
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
